<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="dashboard">

      <!-- Greeting Widget -->
      <section class="widget widget--greeting" id="greeting-widget" aria-label="Greeting and Clock">
        <p class="greeting__time" id="greeting-time">--:--:--</p>
        <p class="greeting__date" id="greeting-date"></p>
        <p class="greeting__message" id="greeting-message">Welcome</p>
      </section>

      <!-- Focus Timer -->
      <section class="widget widget--timer" id="timer-widget" aria-label="Focus Timer">
        <h2 class="widget__title">Focus Timer</h2>
        <p class="timer__display" id="timer-display">25:00</p>
        <p class="timer__completion" id="timer-completion" hidden>Session Complete!</p>
        <div class="timer__controls">
          <button class="btn btn--start" id="timer-start">Start</button>
          <button class="btn btn--stop"  id="timer-stop"  disabled>Stop</button>
          <button class="btn btn--reset" id="timer-reset">Reset</button>
        </div>
      </section>

      <!-- Todo List -->
      <section class="widget widget--todo" id="todo-widget" aria-label="To-Do List">
        <h2 class="widget__title">To-Do List</h2>
        <form class="todo__form" id="todo-form" novalidate>
          <input
            class="todo__input"
            id="todo-input"
            type="text"
            placeholder="Add a new task..."
            aria-label="New task label"
            autocomplete="off"
          />
          <button class="btn btn--add" type="submit">Add</button>
        </form>
        <p class="validation-msg" id="todo-validation" hidden></p>
        <ul class="todo__list" id="todo-list" aria-live="polite"></ul>
      </section>

      <!-- Quick Links -->
      <section class="widget widget--links" id="links-widget" aria-label="Quick Links">
        <h2 class="widget__title">Quick Links</h2>
        <form class="links__form" id="links-form" novalidate>
          <input
            class="links__input"
            id="links-label-input"
            type="text"
            placeholder="Label (max 50 chars)"
            aria-label="Link label"
            maxlength="50"
            autocomplete="off"
          />
          <input
            class="links__input"
            id="links-url-input"
            type="url"
            placeholder="URL (https://...)"
            aria-label="Link URL"
            maxlength="2048"
            autocomplete="off"
          />
          <button class="btn btn--add" type="submit">Add</button>
        </form>
        <p class="validation-msg" id="links-validation" hidden></p>
        <div class="links__panel" id="links-panel" aria-live="polite"></div>
      </section>

    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
